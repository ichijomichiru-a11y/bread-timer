<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover"
    />
    <meta name="theme-color" content="#111111" />
    <title>10パン工程タイマー（安定版）</title>
    <style>
      :root {
        --bg: #0f1115;
        --card: #171a21;
        --muted: #aeb6c2;
        --fg: #eef2f7;
        --ok: #2dd4bf;
        --warn: #fbbf24;
        --bad: #fb7185;
        --line: #273041;
        --btn: #232a36;
        --btn2: #2b3445;
        --radius: 16px;
        --mono:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        --sans: ui-sans-serif, system-ui, -apple-system, sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: var(--sans);
        background: linear-gradient(180deg, #0f1115, #0b0d11);
        color: var(--fg);
        -webkit-tap-highlight-color: transparent;
      }
      header {
        position: sticky;
        top: 0;
        z-index: 10;
        padding: 14px;
        background: rgba(15, 17, 21, 0.92);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(39, 48, 65, 0.7);
      }
      .title-row {
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
      }
      h1 {
        font-size: 18px;
        margin: 0;
      }
      .top-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      button {
        appearance: none;
        border: 1px solid rgba(39, 48, 65, 0.9);
        background: var(--btn);
        color: var(--fg);
        padding: 10px 12px;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      button.primary {
        background: var(--btn2);
      }
      button.ok {
        border-color: rgba(45, 212, 191, 0.7);
      }
      button.warn {
        border-color: rgba(251, 191, 36, 0.75);
      }
      button.danger {
        border-color: rgba(251, 113, 133, 0.7);
      }
      main {
        padding: 14px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 12px;
      }
      .card {
        background: rgba(23, 26, 33, 0.96);
        border: 1px solid rgba(39, 48, 65, 0.9);
        border-radius: var(--radius);
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .card.running {
        border-color: var(--ok);
      }
      .card.stageDone {
        border-color: var(--warn);
      }
      .card.alerting {
        border: 3px solid #d93025;
        animation: alertPulse 0.9s infinite;
      }
      @keyframes alertPulse {
        0% {
          box-shadow: 0 0 0 rgba(217, 48, 37, 0);
        }
        50% {
          box-shadow: 0 0 15px rgba(217, 48, 37, 0.6);
        }
        100% {
          box-shadow: 0 0 0 rgba(217, 48, 37, 0);
        }
      }
      .time {
        font-family: var(--mono);
        font-size: 40px;
        text-align: center;
        margin: 5px 0;
      }
      .label-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .badge {
        font-family: var(--mono);
        font-size: 12px;
        color: var(--muted);
        padding: 2px 8px;
        border-radius: 10px;
        border: 1px solid var(--line);
      }
      input[type="text"],
      input[type="number"] {
        width: 100%;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: rgba(15, 21, 33, 0.8);
        color: var(--fg);
        font-size: 16px;
      }
      .actions,
      .extend-actions {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .actions button,
      .extend-actions button {
        flex: 1;
        min-width: 70px;
      }
      dialog {
        border: none;
        border-radius: 18px;
        width: 90%;
        max-width: 500px;
        background: #1c222d;
        color: #fff;
        padding: 20px;
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
      }
      dialog::backdrop {
        background: rgba(0, 0, 0, 0.8);
      }
      .rowbox {
        display: grid;
        grid-template-columns: 2fr 1fr 1fr auto;
        gap: 8px;
        margin-bottom: 10px;
        align-items: center;
      }
      #clock {
        text-align: right;
        margin-top: 20px;
        color: var(--muted);
        font-family: var(--mono);
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="title-row">
        <h1>10パン工程タイマー</h1>
        <div class="top-actions">
          <button id="allStop">全停止</button>
          <button class="danger" id="allReset">全リセット</button>
        </div>
      </div>
    </header>

    <main>
      <div class="grid" id="grid"></div>
      <div id="clock">00:00:00</div>
    </main>

    <dialog id="stageDialog">
      <h3 id="dlgTitle" style="margin-top: 0">工程を編集</h3>
      <div id="stageInputs"></div>
      <div
        style="
          margin-top: 20px;
          display: flex;
          gap: 10px;
          justify-content: space-between;
        "
      >
        <button id="addStage">＋追加</button>
        <div style="display: flex; gap: 10px">
          <button
            onclick="document.getElementById('stageDialog').close()"
            class="secondary"
          >
            閉じる
          </button>
          <button class="primary" id="dlgSave">保存</button>
        </div>
      </div>
    </dialog>

    <script>
      (() => {
        const N = 10;
        const LS_KEY = "breadTimer_vfinal_fix";
        let audioCtx = null;
        let alertInterval = null;

        const state = { editing: false, timers: [] };

        // --- 音声システムの改善 ---
        function ensureAudio() {
          try {
            const AC = window.AudioContext || window.webkitAudioContext;
            if (!audioCtx || audioCtx.state === "closed") {
              audioCtx = new AC();
            }
            // 中断されていたら再開させる
            if (audioCtx.state === "suspended") {
              audioCtx.resume();
            }
          } catch (e) {
            console.error("AudioContextの初期化に失敗:", e);
          }
        }

        // 画面に戻ってきたときに音を復旧させる処理
        document.addEventListener("visibilitychange", () => {
          if (document.visibilityState === "visible") {
            ensureAudio(); // 画面が見えるようになったら再開を試みる
            checkGlobalAlert(); // アラート中なら音を再始動
          }
        });

        // 画面のどこかを触ったときにも再開（保険）
        document.addEventListener("pointerdown", ensureAudio, {
          passive: true,
        });

        function beep() {
          ensureAudio(); // 鳴らす直前にも状態確認
          if (!audioCtx || audioCtx.state !== "running") return;

          const o = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          o.connect(g);
          g.connect(audioCtx.destination);
          g.gain.setTargetAtTime(0.1, audioCtx.currentTime, 0.01);
          g.gain.exponentialRampToValueAtTime(
            0.0001,
            audioCtx.currentTime + 0.3,
          );
          o.start();
          o.stop(audioCtx.currentTime + 0.3);
        }

        // --- 以下のデータ復元やrenderなどのロジックは以前と同様 ---
        const saved = localStorage.getItem(LS_KEY);
        if (saved) {
          state.timers = JSON.parse(saved);
        } else {
          for (let i = 0; i < N; i++) {
            state.timers.push({
              id: i + 1,
              bread: `パン ${i + 1}`,
              stages: [{ name: "一次発酵", sec: 3600 }],
              stageIdx: 0,
              remainingSec: 3600,
              running: false,
              stageDone: false,
              alerting: false,
            });
          }
        }

        function render() {
          if (state.editing) return;
          const grid = document.getElementById("grid");
          grid.innerHTML = "";

          state.timers.forEach((t, idx) => {
            const card = document.createElement("div");
            card.className = `card ${t.running ? "running" : ""} ${t.stageDone ? "stageDone" : ""} ${t.alerting ? "alerting" : ""}`;
            const m = Math.floor(t.remainingSec / 60);
            const s = t.remainingSec % 60;

            card.innerHTML = `
              <div class="label-row"><div class="badge">#${t.id}</div> <span>${t.stageIdx + 1} / ${t.stages.length} 工程</span></div>
              <input type="text" value="${t.bread}" class="bread-name" placeholder="パンの名前">
              <div style="font-size:13px; color:var(--muted); text-align:center;">${t.stages[t.stageIdx].name}</div>
              <div class="time">${m}:${String(s).padStart(2, "0")}</div>
              <div class="extend-actions">
                <button class="ext-btn" data-m="5">+5分</button>
                <button class="ext-btn" data-m="10">+10分</button>
                <button class="hold-btn">+1分(長押し)</button>
              </div>
              <div class="actions">
                <button class="primary edit-btn">工程編集</button>
                <button class="reset-btn">リセット</button>
                <button class="start-btn ${t.running ? "warn" : "ok"}" style="grid-column: span 2">
                  ${t.running ? "停止" : t.alerting ? "音を止める" : t.stageDone ? "次工程へ" : "開始"}
                </button>
              </div>
            `;

            const nameInp = card.querySelector(".bread-name");
            nameInp.onfocus = () => (state.editing = true);
            nameInp.onblur = () => {
              state.editing = false;
              render();
            };
            nameInp.onchange = (e) => {
              t.bread = e.target.value;
              save();
            };

            card.querySelector(".start-btn").onclick = () => {
              ensureAudio();
              if (t.alerting) {
                t.alerting = false;
                checkGlobalAlert();
              } else if (t.running) {
                t.running = false;
              } else if (t.stageDone && t.stageIdx < t.stages.length - 1) {
                t.stageIdx++;
                t.remainingSec = t.stages[t.stageIdx].sec;
                t.stageDone = false;
                t.running = true;
              } else {
                t.running = true;
                t.stageDone = false;
              }
              render();
            };

            card.querySelector(".reset-btn").onclick = () => {
              t.stageIdx = 0;
              t.remainingSec = t.stages[0].sec;
              t.running = false;
              t.alerting = false;
              t.stageDone = false;
              checkGlobalAlert();
              render();
            };

            card.querySelector(".edit-btn").onclick = () => openEditDialog(idx);

            card.querySelectorAll(".ext-btn").forEach((b) => {
              b.onclick = () => {
                t.remainingSec += b.dataset.m * 60;
                t.running = true;
                t.stageDone = false;
                t.alerting = false;
                checkGlobalAlert();
                render();
              };
            });

            const holdBtn = card.querySelector(".hold-btn");
            let hInt;
            holdBtn.onpointerdown = () => {
              ensureAudio();
              t.remainingSec += 60;
              t.running = true;
              t.alerting = false;
              checkGlobalAlert();
              render();
              hInt = setInterval(() => {
                t.remainingSec += 60;
                render();
              }, 400);
            };
            holdBtn.onpointerup = holdBtn.onpointerleave = () =>
              clearInterval(hInt);

            grid.appendChild(card);
          });
        }

        const dlg = document.getElementById("stageDialog");
        let currentEditIdx = null;

        function openEditDialog(idx) {
          currentEditIdx = idx;
          state.editing = true;
          const container = document.getElementById("stageInputs");
          container.innerHTML = "";
          state.timers[idx].stages.forEach((s, i) =>
            addStageRow(s.name, Math.floor(s.sec / 60), s.sec % 60),
          );
          dlg.showModal();
        }

        function addStageRow(name = "新工程", m = 10, s = 0) {
          const div = document.createElement("div");
          div.className = "rowbox";
          div.innerHTML = `<input type="text" value="${name}" class="s-name"><input type="number" value="${m}" class="s-min"><input type="number" value="${s}" class="s-sec"><button onclick="this.parentElement.remove()" style="border-color:var(--bad);color:var(--bad)">×</button>`;
          document.getElementById("stageInputs").appendChild(div);
        }

        document.getElementById("addStage").onclick = () => addStageRow();
        document.getElementById("dlgSave").onclick = () => {
          const rows = document.querySelectorAll("#stageInputs .rowbox");
          const newStages = Array.from(rows)
            .map((r) => ({
              name: r.querySelector(".s-name").value || "工程",
              sec:
                (parseInt(r.querySelector(".s-min").value) || 0) * 60 +
                (parseInt(r.querySelector(".s-sec").value) || 0),
            }))
            .filter((s) => s.sec > 0);
          if (newStages.length > 0) {
            const t = state.timers[currentEditIdx];
            t.stages = newStages;
            t.stageIdx = 0;
            t.remainingSec = newStages[0].sec;
          }
          state.editing = false;
          save();
          render();
          dlg.close();
        };

        function checkGlobalAlert() {
          const any = state.timers.some((t) => t.alerting);
          if (any) {
            if (!alertInterval) {
              beep();
              alertInterval = setInterval(beep, 2000);
            }
          } else {
            if (alertInterval) {
              clearInterval(alertInterval);
              alertInterval = null;
            }
          }
        }

        function tick() {
          state.timers.forEach((t) => {
            if (t.running && t.remainingSec > 0) {
              t.remainingSec--;
              if (t.remainingSec === 0) {
                t.running = false;
                t.stageDone = true;
                t.alerting = true;
                checkGlobalAlert();
              }
            }
          });
          document.getElementById("clock").textContent =
            new Date().toLocaleTimeString();
        }

        document.getElementById("allStop").onclick = () => {
          state.timers.forEach((t) => (t.running = false));
          render();
        };
        document.getElementById("allReset").onclick = () => {
          if (confirm("全リセットしますか？")) {
            localStorage.clear();
            location.reload();
          }
        };
        function save() {
          localStorage.setItem(LS_KEY, JSON.stringify(state.timers));
        }

        setInterval(() => {
          tick();
          render();
          save();
        }, 1000);
        render();
      })();
    </script>
  </body>
</html>
