<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover"
    />
    <meta name="theme-color" content="#111111" />
    <title>10パン工程タイマー（修正版）</title>
    <style>
      :root {
        --bg: #0f1115;
        --card: #171a21;
        --muted: #aeb6c2;
        --fg: #eef2f7;
        --ok: #2dd4bf;
        --warn: #fbbf24;
        --bad: #fb7185;
        --line: #273041;
        --btn: #232a36;
        --btn2: #2b3445;
        --radius: 16px;
        --mono:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
        --sans:
          ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica,
          Arial;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: var(--sans);
        background: linear-gradient(180deg, #0f1115, #0b0d11);
        color: var(--fg);
      }
      header {
        position: sticky;
        top: 0;
        z-index: 10;
        padding: 14px;
        background: rgba(15, 17, 21, 0.92);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(39, 48, 65, 0.7);
      }
      .title-row {
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
      }
      h1 {
        font-size: 18px;
        margin: 0;
      }
      .top-actions {
        display: flex;
        gap: 8px;
      }
      button {
        border: 1px solid rgba(39, 48, 65, 0.9);
        background: var(--btn);
        color: var(--fg);
        padding: 10px 12px;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      button.primary {
        background: var(--btn2);
      }
      button.ok {
        border-color: var(--ok);
        color: var(--ok);
      }
      button.warn {
        border-color: var(--warn);
        color: var(--warn);
      }
      button.danger {
        border-color: var(--bad);
        color: var(--bad);
      }
      main {
        padding: 14px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 12px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .card.running {
        border-color: var(--ok);
      }
      .card.stageDone {
        border-color: var(--warn);
        box-shadow: 0 0 15px rgba(251, 191, 36, 0.3);
      }
      .card.alerting {
        border: 2px solid var(--bad);
        animation: pulse 1s infinite;
      }
      @keyframes pulse {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.7;
        }
        100% {
          opacity: 1;
        }
      }
      .time {
        font-family: var(--mono);
        font-size: 42px;
        text-align: center;
        margin: 10px 0;
      }
      input[type="text"] {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: #000;
        color: #fff;
      }
      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .extend-row {
        display: flex;
        gap: 4px;
      }
      .extend-row button {
        flex: 1;
        padding: 6px;
        font-size: 12px;
      }
      #clock {
        font-family: var(--mono);
        color: var(--muted);
        text-align: right;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="title-row">
        <h1>10パン工程タイマー</h1>
        <div class="top-actions">
          <button id="allStop">全停止</button>
          <button class="danger" id="allReset">全リセット</button>
        </div>
      </div>
    </header>

    <main>
      <div class="grid" id="grid"></div>
      <div id="clock">00:00:00</div>
    </main>

    <script>
      (() => {
        const N = 10;
        const LS_KEY = "breadTimer_v2";
        let audioCtx = null;
        let alertInterval = null;

        const state = {
          editing: false,
          timers: [],
        };

        // 初期データ作成
        const saved = localStorage.getItem(LS_KEY);
        if (saved) {
          state.timers = JSON.parse(saved);
        } else {
          for (let i = 0; i < N; i++) {
            state.timers.push({
              id: i + 1,
              bread: `パン ${i + 1}`,
              remainingSec: 3600,
              running: false,
              stageDone: false,
              alerting: false,
            });
          }
        }

        function ensureAudio() {
          if (!audioCtx)
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          if (audioCtx.state === "suspended") audioCtx.resume();
        }

        function beep() {
          if (!audioCtx) return;
          const o = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          o.connect(g);
          g.connect(audioCtx.destination);
          g.gain.setValueAtTime(0.1, audioCtx.currentTime);
          g.gain.exponentialRampToValueAtTime(
            0.0001,
            audioCtx.currentTime + 0.5,
          );
          o.start();
          o.stop(audioCtx.currentTime + 0.5);
        }

        function startGlobalAlert() {
          if (alertInterval) return;
          beep();
          alertInterval = setInterval(beep, 2000);
        }

        function stopGlobalAlert() {
          const anyAlerting = state.timers.some((t) => t.alerting);
          if (!anyAlerting && alertInterval) {
            clearInterval(alertInterval);
            alertInterval = null;
          }
        }

        function render() {
          if (state.editing) return;
          const grid = document.getElementById("grid");
          grid.innerHTML = "";

          state.timers.forEach((t, idx) => {
            const card = document.createElement("div");
            card.className = `card ${t.running ? "running" : ""} ${t.stageDone ? "stageDone" : ""} ${t.alerting ? "alerting" : ""}`;

            const m = Math.floor(t.remainingSec / 60);
            const s = t.remainingSec % 60;

            card.innerHTML = `
              <div class="title-row"><strong>#${t.id}</strong></div>
              <input type="text" value="${t.bread}" class="name-input">
              <div class="time">${m}:${String(s).padStart(2, "0")}</div>
              <div class="extend-row">
                <button class="extend-btn" data-min="5">+5分</button>
                <button class="extend-btn" data-min="10">+10分</button>
                <button class="hold-btn">＋1分(長押し)</button>
              </div>
              <div class="actions">
                <button class="start-btn ${t.running ? "warn" : "ok"}">${t.running ? "停止" : t.alerting ? "音を止める" : "開始"}</button>
                <button class="reset-btn">リセット</button>
              </div>
            `;

            // イベント設定
            const input = card.querySelector(".name-input");
            input.onfocus = () => (state.editing = true);
            input.onblur = () => {
              state.editing = false;
              render();
            };
            input.onchange = (e) => {
              t.bread = e.target.value;
              save();
            };

            card.querySelector(".start-btn").onclick = () => {
              ensureAudio();
              if (t.alerting) {
                t.alerting = false;
                stopGlobalAlert();
              } else if (t.running) {
                t.running = false;
              } else {
                t.running = true;
                t.stageDone = false;
              }
              render();
            };

            card.querySelector(".reset-btn").onclick = () => {
              t.running = false;
              t.alerting = false;
              t.stageDone = false;
              t.remainingSec = 3600;
              stopGlobalAlert();
              render();
            };

            card.querySelectorAll(".extend-btn").forEach((btn) => {
              btn.onclick = () => {
                t.remainingSec += parseInt(btn.dataset.min) * 60;
                t.alerting = false;
                t.stageDone = false;
                t.running = true;
                stopGlobalAlert();
                render();
              };
            });

            // 長押し設定
            const holdBtn = card.querySelector(".hold-btn");
            let holdInt;
            holdBtn.onpointerdown = () => {
              ensureAudio();
              t.remainingSec += 60;
              t.running = true;
              t.stageDone = false;
              t.alerting = false;
              stopGlobalAlert();
              render();
              holdInt = setInterval(() => {
                t.remainingSec += 60;
                render();
              }, 400);
            };
            holdBtn.onpointerup = holdBtn.onpointerleave = () =>
              clearInterval(holdInt);

            grid.appendChild(card);
          });
        }

        function tick() {
          state.timers.forEach((t) => {
            if (t.running && t.remainingSec > 0) {
              t.remainingSec--;
              if (t.remainingSec === 0) {
                t.running = false;
                t.stageDone = true;
                t.alerting = true;
                startGlobalAlert();
              }
            }
          });
          const d = new Date();
          document.getElementById("clock").textContent = d.toLocaleTimeString();
        }

        function save() {
          localStorage.setItem(LS_KEY, JSON.stringify(state.timers));
        }

        document.getElementById("allStop").onclick = () => {
          state.timers.forEach((t) => (t.running = false));
          render();
        };
        document.getElementById("allReset").onclick = () => {
          if (confirm("リセットしますか？")) {
            localStorage.clear();
            location.reload();
          }
        };

        setInterval(() => {
          tick();
          render();
          save();
        }, 1000);
        render();
      })();
    </script>
  </body>
</html>
