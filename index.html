<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover"
    />
    <title>10パン工程タイマー（安定版）</title>
    <style>
      :root {
        --bg: #0f1115;
        --card: #171a21;
        --muted: #aeb6c2;
        --fg: #eef2f7;
        --ok: #2dd4bf;
        --warn: #fbbf24;
        --bad: #fb7185;
        --line: #273041;
        --btn: #232a36;
        --btn2: #2b3445;
        --radius: 16px;
        --mono:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: sans-serif;
        background: var(--bg);
        color: var(--fg);
        -webkit-tap-highlight-color: transparent;
      }
      header {
        position: sticky;
        top: 0;
        z-index: 10;
        padding: 14px;
        background: rgba(15, 21, 21, 0.9);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--line);
      }
      .title-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      h1 {
        font-size: 18px;
        margin: 0;
      }
      main {
        padding: 14px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 12px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .card.running {
        border-color: var(--ok);
      }
      .card.stageDone {
        border-color: var(--warn);
      }
      .card.alerting {
        border: 3px solid var(--bad);
        animation: pulse 0.9s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.7;
        }
      }
      .time {
        font-family: var(--mono);
        font-size: 40px;
        text-align: center;
        margin: 5px 0;
      }
      input[type="text"] {
        width: 100%;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: #000;
        color: #fff;
        font-size: 16px;
      }
      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .btn-full {
        grid-column: span 2;
        font-size: 16px;
      }
      button {
        border: 1px solid var(--line);
        background: var(--btn);
        color: var(--fg);
        padding: 12px;
        border-radius: 12px;
        font-weight: bold;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }
      .ok {
        border-color: var(--ok);
        color: var(--ok);
      }
      .warn {
        border-color: var(--warn);
        color: var(--warn);
      }
      .primary {
        background: var(--btn2);
      }
      #clock {
        text-align: right;
        padding: 10px;
        color: var(--muted);
        font-family: var(--mono);
      }
      /* 既存のCSSの最後に追加 */
      .blink-active {
        animation: blink-animation 1s infinite;
        background-color: #ff9800 !important; /* オレンジ色で注意を引く */
        color: white !important;
      }

      @keyframes blink-animation {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
        100% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="title-row">
        <h1>10パン工程タイマー</h1>
      </div>
    </header>
    <main>
      <div class="grid" id="grid"></div>
      <div id="clock">00:00:00</div>
    </main>
    <dialog id="stageDialog">
      <h3 id="dlgTitle" style="margin-top: 0">工程編集</h3>
      <div id="stageInputs"></div>
      <div
        style="
          margin-top: 20px;
          display: flex;
          gap: 10px;
          justify-content: space-between;
        "
      >
        <button id="addStage">＋工程追加</button>
        <div style="display: flex; gap: 10px">
          <button type="button" id="dlgCancel">閉じる</button>
          <button class="primary" id="dlgSave">保存</button>
        </div>
      </div>
    </dialog>
    <script>
      (() => {
        const N = 10;
        const LS_KEY = "breadTimer_stable_v1";
        let audioCtx = null;
        let alertInterval = null;
        const state = { editing: false, timers: [] };

        // --- データの読み込みと強制復旧 ---
        let savedData = localStorage.getItem(LS_KEY);

        // データが壊れている、または空っぽの場合の初期設定
        const defaultTimers = [];
        for (let i = 0; i < 10; i++) {
          defaultTimers.push({
            id: i + 1,
            bread: `パン ${i + 1}`,
            stages: [
              { name: "一次発酵", sec: 3600 },
              { name: "ベンチ", sec: 1200 },
              { name: "最終発酵", sec: 3000 },
            ],
            stageIdx: 0,
            remainingSec: 3600,
            running: false,
            stageDone: false,
            alerting: false,
          });
        }

        // 保存データがあれば読み込み、なければ初期設定を使う
        if (savedData) {
          try {
            state.timers = JSON.parse(savedData);
            // 万が一、読み込んだデータが空配列だったら初期設定を入れる
            if (state.timers.length === 0) state.timers = defaultTimers;
          } catch (e) {
            // データが壊れて読み込めない場合も初期設定を入れる
            state.timers = defaultTimers;
          }
        } else {
          state.timers = defaultTimers;
        }

        // 復旧したデータを一度保存しておく
        save();
        function ensureAudio() {
          if (!audioCtx || audioCtx.state === "closed")
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          if (audioCtx.state === "suspended") audioCtx.resume();
        }

        function beep() {
          ensureAudio();
          if (!audioCtx || audioCtx.state !== "running") return;
          const o = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          o.connect(g);
          g.connect(audioCtx.destination);
          g.gain.setTargetAtTime(0.1, audioCtx.currentTime, 0.01);
          g.gain.exponentialRampToValueAtTime(
            0.0001,
            audioCtx.currentTime + 0.3,
          );
          o.start();
          o.stop(audioCtx.currentTime + 0.3);
        }

        function checkAlert() {
          const any = state.timers.some((t) => t.alerting);
          if (any && !alertInterval) alertInterval = setInterval(beep, 2000);
          if (!any && alertInterval) {
            clearInterval(alertInterval);
            alertInterval = null;
          }
        }

        function render() {
          if (state.editing) return;
          const grid = document.getElementById("grid");
          grid.innerHTML = "";

          state.timers.forEach((t, idx) => {
            const card = document.createElement("div");
            card.className = `card ${t.running ? "running" : ""} ${t.stageDone ? "stageDone" : ""} ${t.alerting ? "alerting" : ""}`;

            const m = Math.floor(t.remainingSec / 60);
            const s = t.remainingSec % 60;
            // --- ボタンの見た目を判定 ---
            const isLast = t.stageIdx >= t.stages.length - 1;
            // --- メッセージ判定を追加 ---
            let msg = `${t.stages[t.stageIdx].name} (${Math.floor(t.stages[t.stageIdx].sec / 60)}分設定)`;
            let msgStyle = "color:var(--muted)";
            if (t.alerting) {
              msg = isLast
                ? "🎉 全工程完了！"
                : "⚠️ 工程終了！作業してください";
              msgStyle = "color:var(--bad); font-weight:bold;";
            } else if (t.stageDone) {
              msg = isLast ? "✅ 全工程クリア" : "✅ 工程完了（待機中）";
              msgStyle = "color:var(--ok); font-weight:bold;";
            }
            const isWaiting = t.stageDone && !t.running && !isLast; // 次の工程を待っている状態

            // クラス名を組み立てる（待機中なら blink-active を追加）
            const startBtnClass = `start-btn btn-full ${t.running ? "warn" : "ok"} ${isWaiting ? "blink-active" : ""}`;

            // ボタンの文字を判定
            let btnText = "▶️ 開始";
            if (t.running) {
              btnText = "停止";
            } else if (t.alerting) {
              btnText = "🔔 音を止める";
            } else if (t.stageDone) {
              btnText = isLast ? "✅ 全工程終了" : "➡️ 次工程開始 (待機中)";
            }

            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; font-size:12px;">
                    <span class="badge">#${t.id}</span>
                    <span>${t.stageIdx + 1} / ${t.stages.length} 工程</span>
                </div>
                <input type="text" value="${t.bread}" class="name-in">
                <div style="text-align:center; font-size:13px; ${msgStyle}">${msg}</div>
                <div class="time" style="${t.alerting ? "color:var(--bad)" : ""}">${m}:${String(s).padStart(2, "0")}</div>
                <div style="display: flex; gap: 6px; margin-bottom: 8px;">
                    <button class="ext-btn" data-m="5" style="flex:1; padding:8px; font-size:12px; border-color:var(--warn); color:var(--warn);">+5分</button>
                    <button class="ext-btn" data-m="10" style="flex:1; padding:8px; font-size:12px; border-color:var(--warn); color:var(--warn);">+10分</button>
                </div>
                <div class="actions">
                    <button class="primary edit-btn" ${t.running ? 'disabled style="opacity:0.3"' : ""}>工程編集</button>
                    <button class="skip-btn" ${isLast || t.running ? "disabled" : ""}>次工程へ</button>
                    <button class="reset-btn">リセット</button>
                    <button class="${startBtnClass}">
                        ${btnText}
                    </button>
                </div>
            `;
            // イベント登録セクションに追加
            card.querySelector(".edit-btn").onclick = () => openEditDialog(idx);
            const nameIn = card.querySelector(".name-in");
            nameIn.onfocus = () => {
              state.editing = true;
            };
            nameIn.onblur = () => {
              state.editing = false;
              render();
            };
            nameIn.onchange = (e) => {
              t.bread = e.target.value;
              save();
            };

            // 工程編集ボタンの動き
            const editBtn = card.querySelector(".edit-btn");
            if (editBtn) {
              editBtn.onclick = () => {
                ensureAudio(); // 音声の準備
                openEditDialog(idx); // ダイアログを開く
              };
            }

            // スキップボタンの動き
            const skipBtn = card.querySelector(".skip-btn");
            if (skipBtn) {
              skipBtn.onclick = () => {
                if (confirm("次の工程にスキップしますか？")) {
                  t.stageIdx++;
                  t.remainingSec = t.stages[t.stageIdx].sec;
                  t.running = false;
                  t.stageDone = false;
                  t.alerting = false;
                  checkAlert();
                  render();
                }
              };
            }

            // リセットボタンの動き
            card.querySelector(".reset-btn").onclick = () => {
              t.stageIdx = 0;
              t.remainingSec = t.stages[0].sec;
              t.running = false;
              t.stageDone = false;
              t.alerting = false;
              checkAlert();
              render();
            };

            // スタート/停止ボタンの動き
            card.querySelector(".start-btn").onclick = () => {
              ensureAudio();
              if (t.alerting) {
                t.alerting = false;
              } else if (t.running) {
                t.running = false;
              } else if (t.stageDone && !isLast) {
                t.stageIdx++;
                t.remainingSec = t.stages[t.stageIdx].sec;
                t.stageDone = false;
                t.running = true;
              } else if (!t.stageDone) {
                t.running = true;
              }
              checkAlert();
              render();
            };
            card.querySelector(".start-btn").onclick = () => {
              ensureAudio();
              if (t.alerting) {
                t.alerting = false;
              } else if (t.running) {
                t.running = false;
              } else if (t.stageDone && !isLast) {
                t.stageIdx++;
                t.remainingSec = t.stages[t.stageIdx].sec;
                t.stageDone = false;
                t.running = true;
              } else if (!t.stageDone) {
                t.running = true;
              }
              checkAlert();
              render();
            };
            // --- 追加：延長ボタンのクリックイベント ---
            card.querySelectorAll(".ext-btn").forEach((btn) => {
              btn.onclick = () => {
                ensureAudio();
                // ボタンから「5」や「10」を取得して秒に変換
                const addSec = parseInt(btn.dataset.m) * 60;
                t.remainingSec += addSec;

                // 延長した際のルール設定
                t.running = true; // 自動でタイマーを開始する
                t.stageDone = false; // 「完了」の状態を解除する
                t.alerting = false; // 鳴っている音を止める

                checkAlert(); // 全体の音の状態をチェック
                save(); // データを保存
                render(); // 画面を更新
              };
            });
            card.querySelector(".skip-btn").onclick = () => {
              if (confirm("次の工程にスキップしますか？")) {
                t.stageIdx++;
                t.remainingSec = t.stages[t.stageIdx].sec;
                t.running = false;
                t.stageDone = false;
                t.alerting = false;
                checkAlert();
                render();
              }
            };

            card.querySelector(".reset-btn").onclick = () => {
              t.stageIdx = 0;
              t.remainingSec = t.stages[0].sec;
              t.running = false;
              t.stageDone = false;
              t.alerting = false;
              checkAlert();
              render();
            };

            grid.appendChild(card);
          });
        }

        // --- 工程編集ダイアログの制御 ---
        function openEditDialog(idx) {
          currentEditIdx = idx;
          state.editing = true; // タイマー更新を一時停止

          const t = state.timers[idx];
          const container = document.getElementById("stageInputs");
          container.innerHTML = "";

          // 現在の工程を画面に並べる
          t.stages.forEach((s, i) =>
            addStageRow(s.name, Math.floor(s.sec / 60), s.sec % 60),
          );

          document.getElementById("dlgTitle").textContent =
            `${t.bread} の工程編集`;
          document.getElementById("stageDialog").showModal();
        }

        function addStageRow(name = "新工程", m = 10, s = 0) {
          const div = document.createElement("div");
          div.className = "rowbox";
          div.style =
            "display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 8px; margin-bottom: 10px;";
          div.innerHTML = `
                    <input type="text" value="${name}" class="s-name" style="width:100%">
                    <input type="number" value="${m}" class="s-min" style="width:100%">
                    <input type="number" value="${s}" class="s-sec" style="width:100%">
                    <button onclick="this.parentElement.remove()" style="color:var(--bad)">×</button>
                `;
          document.getElementById("stageInputs").appendChild(div);
        }

        // 保存ボタンの処理
        document.getElementById("dlgSave").onclick = () => {
          const rows = document.querySelectorAll("#stageInputs .rowbox");
          const newStages = Array.from(rows)
            .map((r) => ({
              name: r.querySelector(".s-name").value || "工程",
              sec:
                (parseInt(r.querySelector(".s-min").value) || 0) * 60 +
                (parseInt(r.querySelector(".s-sec").value) || 0),
            }))
            .filter((s) => s.sec > 0);

          if (newStages.length > 0) {
            const t = state.timers[currentEditIdx];
            t.stages = newStages;
            t.stageIdx = 0;
            t.remainingSec = newStages[0].sec;
            t.running = false;
            t.stageDone = false;
            t.alerting = false;
          }

          save();
          render();
          alert("設定を保存しました。");
        };

        document.getElementById("addStage").onclick = () => addStageRow();

        document.getElementById("dlgCancel").onclick = () => {
          state.editing = false;
          document.getElementById("stageDialog").close();
          render();
        };

        // --- ここに「閉じる」ボタンの処理を追加します ---
        document.getElementById("dlgCancel").onclick = () => {
          state.editing = false; // 編集モードを解除
          document.getElementById("stageDialog").close(); // ダイアログを閉じる
          render(); // 画面を更新してタイマー描画を再開
        };

        let lastTickTime = Date.now(); // 前回の計算時刻を記録しておく変数

        function tick() {
          const now = Date.now();
          const delta = Math.floor((now - lastTickTime) / 1000); // 前回から何秒経過したか計算

          if (delta >= 1) {
            // 1秒以上経過していたら
            state.timers.forEach((t) => {
              if (t.running && t.remainingSec > 0) {
                // 1ずつ引くのではなく、経過した秒数分を一気に引く
                t.remainingSec = Math.max(0, t.remainingSec - delta);

                if (t.remainingSec === 0) {
                  t.running = false;
                  t.stageDone = true;
                  t.alerting = true;
                  checkAlert();
                }
              }
            });
            lastTickTime = now; // 基準時刻を更新
          }

          // 時計の表示更新
          document.getElementById("clock").textContent =
            new Date().toLocaleTimeString();
        }
        // --- 復帰時の音再生対策（強化版） ---
        const restartAudio = () => {
          if (audioCtx) {
            // 音のエンジンが眠っていたら「再開」を命じる
            if (audioCtx.state === "suspended") {
              audioCtx.resume();
            }
          }
          ensureAudio(); // 既存の準備処理も実行
        };

        // 画面に戻ってきたときに自動で再開を試みる
        document.addEventListener("visibilitychange", () => {
          if (document.visibilityState === "visible") {
            restartAudio();
          }
        });

        // 画面のどこかを触った瞬間に音の詰まりを解消する
        document.addEventListener("pointerdown", restartAudio, {
          passive: true,
        });
        function save() {
          localStorage.setItem(LS_KEY, JSON.stringify(state.timers));
        }

        setInterval(() => {
          tick();
          render();
          save();
        }, 1000);
        render();
      })();
    </script>
  </body>
</html>
