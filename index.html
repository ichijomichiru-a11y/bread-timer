<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover"
    />
    <title>10パン工程タイマー（安定版）</title>
    <style>
      :root {
        --bg: #0f1115;
        --card: #171a21;
        --muted: #aeb6c2;
        --fg: #eef2f7;
        --ok: #2dd4bf;
        --warn: #fbbf24;
        --bad: #fb7185;
        --line: #273041;
        --btn: #232a36;
        --btn2: #2b3445;
        --radius: 16px;
        --mono:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: sans-serif;
        background: var(--bg);
        color: var(--fg);
        -webkit-tap-highlight-color: transparent;
      }
      header {
        position: sticky;
        top: 0;
        z-index: 10;
        padding: 14px;
        background: rgba(15, 21, 21, 0.9);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--line);
      }
      .title-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      h1 {
        font-size: 18px;
        margin: 0;
      }
      main {
        padding: 14px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 12px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .card.running {
        border-color: var(--ok);
      }
      .card.stageDone {
        border-color: var(--warn);
      }
      .card.alerting {
        border: 3px solid var(--bad);
        animation: pulse 0.9s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.7;
        }
      }
      .time {
        font-family: var(--mono);
        font-size: 40px;
        text-align: center;
        margin: 5px 0;
      }
      input[type="text"] {
        width: 100%;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: #000;
        color: #fff;
        font-size: 16px;
      }
      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .btn-full {
        grid-column: span 2;
        font-size: 16px;
      }
      button {
        border: 1px solid var(--line);
        background: var(--btn);
        color: var(--fg);
        padding: 12px;
        border-radius: 12px;
        font-weight: bold;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }
      .ok {
        border-color: var(--ok);
        color: var(--ok);
      }
      .warn {
        border-color: var(--warn);
        color: var(--warn);
      }
      .primary {
        background: var(--btn2);
      }
      #clock {
        text-align: right;
        padding: 10px;
        color: var(--muted);
        font-family: var(--mono);
      }
    </style>
  </head>
  <body>
    <header>
      <div class="title-row">
        <h1>10パン工程タイマー</h1>
        <button id="allReset" style="color: var(--bad)">全リセット</button>
      </div>
    </header>
    <main>
      <div class="grid" id="grid"></div>
      <div id="clock">00:00:00</div>
    </main>

    <script>
      (() => {
        const N = 10;
        const LS_KEY = "breadTimer_stable_v1";
        let audioCtx = null;
        let alertInterval = null;
        const state = { editing: false, timers: [] };

        // 初期データロード
        const saved = localStorage.getItem(LS_KEY);
        if (saved) {
          state.timers = JSON.parse(saved);
        } else {
          for (let i = 0; i < N; i++) {
            state.timers.push({
              id: i + 1,
              bread: `パン ${i + 1}`,
              stages: [
                { name: "一次発酵", sec: 3600 },
                { name: "ベンチ", sec: 1200 },
                { name: "最終発酵", sec: 3000 },
              ],
              stageIdx: 0,
              remainingSec: 3600,
              running: false,
              stageDone: false,
              alerting: false,
            });
          }
        }

        function ensureAudio() {
          if (!audioCtx || audioCtx.state === "closed")
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          if (audioCtx.state === "suspended") audioCtx.resume();
        }

        function beep() {
          ensureAudio();
          if (!audioCtx || audioCtx.state !== "running") return;
          const o = audioCtx.createOscillator();
          const g = audioCtx.createGain();
          o.connect(g);
          g.connect(audioCtx.destination);
          g.gain.setTargetAtTime(0.1, audioCtx.currentTime, 0.01);
          g.gain.exponentialRampToValueAtTime(
            0.0001,
            audioCtx.currentTime + 0.3,
          );
          o.start();
          o.stop(audioCtx.currentTime + 0.3);
        }

        function checkAlert() {
          const any = state.timers.some((t) => t.alerting);
          if (any && !alertInterval) alertInterval = setInterval(beep, 2000);
          if (!any && alertInterval) {
            clearInterval(alertInterval);
            alertInterval = null;
          }
        }

        function render() {
          if (state.editing) return;
          const grid = document.getElementById("grid");
          grid.innerHTML = "";

          state.timers.forEach((t, idx) => {
            const card = document.createElement("div");
            card.className = `card ${t.running ? "running" : ""} ${t.stageDone ? "stageDone" : ""} ${t.alerting ? "alerting" : ""}`;

            const m = Math.floor(t.remainingSec / 60);
            const s = t.remainingSec % 60;
            const isLast = t.stageIdx >= t.stages.length - 1;

            // メッセージ判定
            let msg = `${t.stages[t.stageIdx].name} (${Math.floor(t.stages[t.stageIdx].sec / 60)}分設定)`;
            let msgStyle = "color:var(--muted)";
            if (t.alerting) {
              msg = isLast
                ? "🎉 全工程完了！"
                : "⚠️ 工程終了！作業してください";
              msgStyle = "color:var(--bad); font-weight:bold;";
            } else if (t.stageDone) {
              msg = isLast ? "✅ 全工程クリア" : "✅ 工程完了（待機中）";
              msgStyle = "color:var(--ok); font-weight:bold;";
            }

            card.innerHTML = `
                        <div style="display:flex; justify-content:space-between; font-size:12px;">
                            <span class="badge">#${t.id}</span>
                            <span>${t.stageIdx + 1} / ${t.stages.length} 工程</span>
                        </div>
                        <input type="text" value="${t.bread}" class="name-in">
                        <div style="text-align:center; font-size:13px; ${msgStyle}">${msg}</div>
                        <div class="time" style="${t.alerting ? "color:var(--bad)" : ""}">${m}:${String(s).padStart(2, "0")}</div>
                        <div class="actions">
                            <button class="skip-btn" ${isLast || t.running ? "disabled" : ""}>次工程へ</button>
                            <button class="reset-btn">リセット</button>
                            <button class="start-btn btn-full ${t.running ? "warn" : "ok"}">
                                ${t.running ? "停止" : t.alerting ? "🔔 音を止める" : t.stageDone ? (isLast ? "✅ 終了" : "➡️ 次工程開始") : "▶️ 開始"}
                            </button>
                        </div>
                    `;

            // イベント登録
            const nameIn = card.querySelector(".name-in");
            nameIn.onfocus = () => (state.editing = true);
            nameIn.onblur = () => {
              state.editing = false;
              render();
            };
            nameIn.onchange = (e) => {
              t.bread = e.target.value;
              save();
            };

            card.querySelector(".start-btn").onclick = () => {
              ensureAudio();
              if (t.alerting) {
                t.alerting = false;
              } else if (t.running) {
                t.running = false;
              } else if (t.stageDone && !isLast) {
                t.stageIdx++;
                t.remainingSec = t.stages[t.stageIdx].sec;
                t.stageDone = false;
                t.running = true;
              } else if (!t.stageDone) {
                t.running = true;
              }
              checkAlert();
              render();
            };

            card.querySelector(".skip-btn").onclick = () => {
              if (confirm("次の工程にスキップしますか？")) {
                t.stageIdx++;
                t.remainingSec = t.stages[t.stageIdx].sec;
                t.running = false;
                t.stageDone = false;
                t.alerting = false;
                checkAlert();
                render();
              }
            };

            card.querySelector(".reset-btn").onclick = () => {
              t.stageIdx = 0;
              t.remainingSec = t.stages[0].sec;
              t.running = false;
              t.stageDone = false;
              t.alerting = false;
              checkAlert();
              render();
            };

            grid.appendChild(card);
          });
        }

        function tick() {
          state.timers.forEach((t) => {
            if (t.running && t.remainingSec > 0) {
              t.remainingSec--;
              if (t.remainingSec === 0) {
                t.running = false;
                t.stageDone = true;
                t.alerting = true;
                checkAlert();
              }
            }
          });
          document.getElementById("clock").textContent =
            new Date().toLocaleTimeString();
        }

        // 復帰時の音再生対策
        document.addEventListener("visibilitychange", () => {
          if (document.visibilityState === "visible") ensureAudio();
        });
        document.addEventListener("pointerdown", ensureAudio, {
          passive: true,
        });
        document.getElementById("allReset").onclick = () => {
          if (confirm("全リセット？")) {
            localStorage.clear();
            location.reload();
          }
        };

        function save() {
          localStorage.setItem(LS_KEY, JSON.stringify(state.timers));
        }

        setInterval(() => {
          tick();
          render();
          save();
        }, 1000);
        render();
      })();
    </script>
  </body>
</html>
